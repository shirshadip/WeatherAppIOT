<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IoT Weather Dashboard</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .card {
            display: inline-block;
            background: #222;
            padding: 30px;
            margin: 20px;
            border-radius: 10px;
            min-width: 220px;
        }
    </style>
</head>

<body>

<h1>IoT Weather Application</h1>

<div class="card">
    <h2>Temperature (°C)</h2>
    <h1 id="temp">--</h1>
</div>

<div class="card">
    <h2>Temperature (°F)</h2>
    <h1 id="tempF">--</h1>
</div>

<div class="card">
    <h2>Humidity</h2>
    <h1 id="hum">--</h1>
</div>

<script>
function fetchData() {
    fetch("/data", { cache: "no-store" })
        .then(res => res.json())
        .then(data => {

            // HARD LOG (keep while testing)
            console.log("LIVE DATA:", data);

            const c = Number(data.temperature);
            const h = Number(data.humidity);

            if (!Number.isFinite(c) || !Number.isFinite(h)) {
                console.warn("Invalid data, skipping update");
                return;
            }

            const f = (c * 9 / 5) + 32;

            document.getElementById("temp").innerText = c.toFixed(2) + " °C";
            document.getElementById("tempF").innerText = f.toFixed(2) + " °F";
            document.getElementById("hum").innerText = h.toFixed(2) + " %";
        })
        .catch(err => console.error("Fetch error:", err));
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
